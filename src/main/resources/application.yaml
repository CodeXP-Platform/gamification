server:
    port: ${PORT:8083}

spring:
    application:
        name: ${APP_NAME:gamification}

    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
        username: ${DB_USER:postgres}
        password: ${DB_PASSWORD:postgres}
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        open-in-view: false
        properties:
            hibernate:
                format_sql: true

    rabbitmq:
        host: ${RABBITMQ_HOST:localhost}
        port: ${RABBITMQ_PORT:5672}
        username: ${RABBITMQ_USER:rabbitmq}
        password: ${RABBITMQ_PASS:rabbitmq}
        virtual-host: ${RABBITMQ_VHOST:/}
        ssl:
            enabled: ${RABBITMQ_SSL_ENABLED:false}
        listener:
            simple:
                retry:
                    enabled: true
                    initial-interval: 3s
                    max-retries: 3

eureka:
    instance:
        # When using Docker/k8s then true
        prefer-ip-address: ${EUREKA_PREFER_IP:true}
        instance-id: ${spring.application.name}:${server.port}
    client:
        register-with-eureka: ${EUREKA_REGISTER:true}
        fetch-registry: ${EUREKA_FETCH:true}
        service-url:
            defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
management:
    health:
        rabbit:
            enabled: false

app:
    rabbitmq:
        exchanges:
            code-analysis: codeanalysis.exchange
            gamification: gamification.exchange
            iam: iam.exchange
        queues:
            analysis-ready: gamification.analysis.ready.queue
            user-created: iam.user.created.queue
        routing-keys:
            analysis-ready: codeanalysis.analysis.ready
            achievement-unlocked: gamification.achievement.unlocked
            user-created: iam.user.created
