server:
  port: ${PORT:8083}

spring:
  application:
    name: ${APP_NAME:gamification}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  health:
    rabbit:
      enabled: false

app:
  rabbitmq:
    exchanges:
      code-analysis: codeanalysis.exchange
      gamification: gamification.exchange
    queues:
      analysis-ready: gamification.analysis.ready.queue
    routing-keys:
      analysis-ready: codeanalysis.analysis.ready
      achievement-unlocked: gamification.achievement.unlocked